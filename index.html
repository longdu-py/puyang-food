<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濮阳小吃网 - 地道濮阳特色美食</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <div class="header-box">
            <div class="logo">濮阳小吃网</div>
            <nav>
                <a href="index.html">首页</a>
                <a href="food.html">美食大全</a>
                <a href="about.html">美食文化</a>
            </nav>
        </div>
    </header>

    <section class="banner">
        <div>
            <h2>寻味濮阳，尝遍老城人间烟火</h2>
            <p>壮馍、裹凉皮、炸灌肠、滑脊汤、羊肉炉一站式推荐</p>
        </div>
    </section>

    <div class="container">
        <h2 class="title">热门濮阳特色小吃</h2>
        <div class="food-list">
            <div class="food-card">
                <img src="./images/zhuangmo.jpg" alt="濮阳壮馍">
                <div class="card-text">
                    <h3>濮阳壮馍</h3>
                    <p>外皮焦脆，多层肉馅，濮阳标志性面食，外酥里嫩</p>
                </div>
            </div>
            <div class="food-card">
                <img src="./images/guoliangpi.jpg" alt="裹凉皮">
                <div class="card-text">
                    <h3>濮阳裹凉皮</h3>
                    <p>全国独一份，凉皮裹蔬菜面筋，清爽解馋街头小吃</p>
                </div>
            </div>
            <div class="food-card">
                <img src="./images/guanchang.jpg" alt="炸灌肠">
                <div class="card-text">
                    <h3>老城炸灌肠</h3>
                    <p>红薯淀粉灌肠油炸，蘸蒜汁香辣可口，老濮阳记忆</p>
                </div>
            </div>
            <div class="food-card">
                <img src="./images/huajitang.jpg" alt="濮城滑脊汤">
                <div class="card-text">
                    <h3>濮城滑脊汤</h3>
                    <p>肉质滑嫩汤汁鲜，清淡暖胃，范县经典特色汤品</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 濮阳小吃网 | 本地特色美食分享站</p>
    </footer>
    <script src="./js/main.js"></script>
</body>
</html>
