<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食大全 | 濮阳小吃网</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <div class="header-box">
            <div class="logo">濮阳小吃网</div>
            <nav>
                <a href="index.html">首页</a>
                <a href="food.html">美食大全</a>
                <a href="about.html">美食文化</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h2 class="title">全部濮阳特色美食</h2>
        <div class="food-list">
            <div class="food-card">
                <img src="./images/zhuangmo.jpg" alt="濮阳壮馍">
                <div class="card-text">
                    <h3>濮阳壮馍</h3>
                    <p>豫北非遗面食，一斤半超大饼，多层牛肉/猪肉馅</p>
                </div>
            </div>
            <div class="food-card">
                <img src="./images/guoliangpi.jpg" alt="裹凉皮">
                <div class="card-text">
                    <h3>裹凉皮</h3>
                    <p>濮阳独创，整张凉皮包裹配菜，方便携带</p>
                </div>
            </div>
            <div class="food-card">
                <img src="./images/guanchang.jpg" alt="炸灌肠">
                <div class="card-text">
                    <h3>炸灌肠</h3>
                    <p>老城夜市必吃，焦香软糯，蒜水灵魂搭配</p>
                </div>
            </div>
            <div class="food-card">
                <img src="./images/huajitang.jpg" alt="滑脊汤">
                <div class="card-text">
                    <h3>濮城滑脊汤</h3>
                    <p>范县传统名菜，薄肉片裹淀粉，汤汁鲜美</p>
                </div>
            </div>
            <div class="food-card">
                <img src="./images/mutton.jpg" alt="老城羊肉炉">
                <div class="card-text">
                    <h3>老城羊肉炉</h3>
                    <p>秋冬特色，羊骨浓汤配白菜豆腐，暖身驱寒</p>
                </div>
            </div>
            <div class="food-card">
                <img src="./images/shaobing.jpg" alt="芝麻烧饼">
                <div class="card-text">
                    <h3>五香芝麻烧饼</h3>
                    <p>千层酥皮，满口芝麻香，搭配胡辣汤绝佳</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 濮阳小吃网 | 本地特色美食分享站</p>
    </footer>
    <script src="./js/main.js"></script>
</body>
</html>
